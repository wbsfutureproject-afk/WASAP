services:
  - type: web
    name: wbs-ios
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    disk:
      name: wbs-data
      mountPath: /var/data
      sizeGB: 1
